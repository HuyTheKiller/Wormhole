[manifest]
version = "1.0.0"
priority = 0

[[patches]]
[patches.pattern]
target = "engine/sprite.lua"
pattern = '''love.graphics.draw(
        self.atlas.image,
        self.sprite,
        -(other_obj.T.w/2 -other_obj.VT.w/2)*10,
        0,
        0,
        other_obj.VT.w/(other_obj.T.w),
        other_obj.VT.h/(other_obj.T.h)
    )'''
position = "at"
payload = '''if other_obj.is_acme_ball then
    love.graphics.draw(
        self.atlas.image,
        self.sprite,
        -(other_obj.T.w/2 -other_obj.VT.w/2)*10,
        0,
        0,
        self.VT.w/(self.T.w),
        self.VT.h/(self.T.h)
    )
else
    love.graphics.draw(
        self.atlas.image,
        self.sprite,
        -(other_obj.T.w/2 -other_obj.VT.w/2)*10,
        0,
        0,
        other_obj.VT.w/(other_obj.T.w),
        other_obj.VT.h/(other_obj.T.h)
    )
end'''
match_indent = true    

# printer: set flag after hand score is finalized
[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = "check_and_set_high_score('hand', hand_chips*mult)"
position = "after"
payload = '''if Wormhole and Wormhole.ACME then
    local _s = hand_chips * mult
    Wormhole.ACME._last_hand_score = _s
    Wormhole.ACME._last_blind_req = G.GAME.blind.chips
    if not Wormhole.ACME._best_hand or _s > Wormhole.ACME._best_hand then
        Wormhole.ACME._best_hand = _s
    end
end'''
match_indent = true