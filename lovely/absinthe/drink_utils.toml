[manifest]
version = "1.0.0"
dump_lua = true
priority = 1

# Prevent "BUY AND USE" button on Drinks in shop
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = 'return base_background'
position = "before"
payload = '''
if card.area == G.shop_jokers and G.shop_jokers then
  if card.ability.consumeable and card.ability.set == "abs_drinks"  then
    base_attach.children.buy_and_use = nil
  end
  base_attach.children.buy = G.UIDEF.card_focus_button{
    card = card, parent = base_attach, type = 'buy',
    func = 'can_buy', button = 'buy_from_shop', card_width = card_width, buy_and_use = buy_and_use
  }
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''
card.children.price.alignment.offset.y = card.ability.set == 'Booster' and 0.5 or 0.38
'''
position = 'before'
payload = '''
if card.ability.set == "abs_drinks" then
  card.children.buy_and_use_button = nil
end
'''
match_indent = true

# Prevent context.using_consumeable on drink prime toggle
[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
pattern = '''
SMODS.calculate_context({using_consumeable = true, consumeable = card, area = card.from_area})
'''
position = 'at'
payload = '''
if card.ability.set ~= 'abs_drinks' or card.config.center.soul_set == 'abs_drinks' then
  SMODS.calculate_context({using_consumeable = true, consumeable = card, area = card.from_area})
end
'''
match_indent = true

# Add use buttons to Vouchers and Boosters while in G.consumeables
[[patches]]
[patches.pattern]
target = 'functions/UI_definitions.lua'
pattern = '''
if card.ability.consumeable then
'''
position = 'before'
payload = '''
if card.ability.set == 'Voucher' then
  return {
      n=G.UIT.ROOT, config = {padding = 0, colour = G.C.CLEAR}, nodes={
        {n=G.UIT.C, config={padding = 0.15, align = 'cl'}, nodes={
          {n=G.UIT.R, config={align = 'cl'}, nodes={
            sell
          }},
          {n=G.UIT.R, config={align = 'cl'}, nodes={
              {n=G.UIT.C, config={align = "cr"}, nodes={
              {n=G.UIT.C, config={ref_table = card, align = "cr",maxw = 1.25, padding = 0.1, r=0.08, minw = 1.25, minh = (card.area and card.area.config.type == 'joker') and 0 or 1, hover = true, shadow = true, colour = G.C.UI.BACKGROUND_INACTIVE, one_press = true, button = 'use_card', func = 'can_redeem'}, nodes={
                {n=G.UIT.B, config = {w=0.1,h=0.6}},
                {n=G.UIT.T, config={text = localize('b_redeem'),colour = G.C.UI.TEXT_LIGHT, scale = 0.55, shadow = true}}
              }}
            }}
          }},
        }},
      }}
end

if card.ability.set == 'Booster' then
  return {
      n=G.UIT.ROOT, config = {padding = 0, colour = G.C.CLEAR}, nodes={
        {n=G.UIT.C, config={padding = 0.15, align = 'cl'}, nodes={
          {n=G.UIT.R, config={align = 'cl'}, nodes={
            sell
          }},
          {n=G.UIT.R, config={align = 'cl'}, nodes={
              {n=G.UIT.C, config={align = "cr"}, nodes={
              {n=G.UIT.C, config={ref_table = card, align = "cr",maxw = 1.25, padding = 0.1, r=0.08, minw = 1.25, minh = (card.area and card.area.config.type == 'joker') and 0 or 1, hover = true, shadow = true, colour = G.C.UI.BACKGROUND_INACTIVE, one_press = true, button = 'use_card', func = 'can_open'}, nodes={
                {n=G.UIT.B, config = {w=0.1,h=0.6}},
                {n=G.UIT.T, config={text = localize('b_open'),colour = G.C.UI.TEXT_LIGHT, scale = 0.55, shadow = true}}
              }}
            }}
          }},
        }},
      }}
end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'card.lua'
pattern = '''
if self.ability.consumeable or self.ability.set == 'Joker' or (self.area and self.area == G.pack_cards) then
'''
position = 'at'
payload = '''
if self.ability.consumeable or self.ability.set == 'Joker' or self.ability.set == 'Voucher' or self.ability.set == 'Booster' or (self.area and self.area == G.pack_cards) then
'''
match_indent = true

[[patches]]
[patches.pattern]
target = 'functions/button_callbacks.lua'
pattern = '''
if card.ability.set == 'Voucher' then 
  G.CONTROLLER:snap_to({node = G.shop:get_UIE_by_ID('next_round_button')})
'''
position = 'at'
payload = '''
if card.ability.set == 'Voucher' and card.from_area ~= G.consumeables then 
  G.CONTROLLER:snap_to({node = G.shop:get_UIE_by_ID('next_round_button')})
'''
match_indent = true

# Make weight polling respect vouchers and hidden objects better
[[patches]]
[patches.pattern]
target = '''=[SMODS _ "src/utils/weights.lua"]'''
pattern = '''
else
  add = true
'''
position = 'before'
payload = '''
elseif v.set == 'Voucher' then 
  if not G.GAME.used_vouchers[v.key] then
    add = true
    if v.requires then
      for _, vv in pairs(v.requires) do
        if not G.GAME.used_vouchers[vv] then
          add = nil
        end
      end
    end
  end
elseif v.hidden and not args.allow_legendaries then
  add = nil
'''
match_indent = true


# Make deck view render absinthe modifiers
[[patches]]
[patches.pattern]
target = '''functions/common_events.lua'''
pattern = '''
    new_card.pinned = other.pinned
'''
position = 'after'
payload = '''
    new_card.absinthe_modified = other.absinthe_modified
'''
match_indent = true


# save absinthe modifiers between runs
[[patches]]
[patches.pattern]
target = '''card.lua'''
pattern = '''
    self.pinned = cardTable.pinned
'''
position = 'after'
payload = '''
    self.absinthe_modified = cardTable.absinthe_modified
'''
match_indent = true

# save absinthe modifiers between runs
[[patches]]
[patches.pattern]
target = '''card.lua'''
pattern = '''
        pinned = self.pinned,
'''
position = 'after'
payload = '''
        absinthe_modified = self.absinthe_modified,
'''
match_indent = true
